title: Medusa - PowerShell Command History Wipe
id: c13f73fa-da21-4346-964b-2060ec3b1066
status: experimental
description: |
    Detects deletion of the PowerShell PSReadLine command-history file, mapping to
    Clear Command History (T1070.003) and Prevent Command History Logging (T1690).
    Medusa operators run the exact command
    'Remove-Item (Get-PSReadlineOption).HistorySavePath' to cover their tracks.
    Matches the PowerShell binary plus references to the history-file removal.
references:
    - https://www.cisa.gov/news-events/cybersecurity-advisories/aa25-071a
    - https://attack.mitre.org/groups/G1051/
    - https://attack.mitre.org/techniques/T1070/003/
author: Generated (sigma authored on Corbin Griffin's behalf) — see repo README scope note
date: 2026-06-30
tags:
    - attack.defense-evasion
    - attack.t1070.003
logsource:
    category: process_creation
    product: windows
detection:
    selection_img:
        - Image|endswith: '\powershell.exe'
        - Image|endswith: '\pwsh.exe'
        - OriginalFileName:
              - 'PowerShell.EXE'
              - 'pwsh.dll'
    selection_history:
        CommandLine|contains:
            - 'HistorySavePath'
            - 'ConsoleHost_history'
            - 'Clear-History'
    condition: all of selection_*
falsepositives:
    - Rare; some privacy or cleanup scripts may legitimately clear PowerShell history
level: high
